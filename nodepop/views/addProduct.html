<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title><%= title %></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
<body>
    <div class="container">
        <form method="POST" action="/addProduct" class="row g-3">
        <div class="col-md-6">
            <label for="product-name" class="form-label">Nombre</label>
            <input type="text" class="form-control" name="name" id="product-name">
        </div>
        <div class="col-md-6">
            <label for="product-price" class="form-label">Precio</label>
            <input type="number" class="form-control" name="price" id="product-price">
        </div>
        <div class="col-12">
            <label for="input-tag" class="form-label">Etiqueta</label>
            <select class="form-select" id="input-tag" name="tags" required multiple>
                    <option value="work">work</option>
                    <option value="lifestyle">lifestyle</option>
                    <option value="motor">motor</option>
                    <option value="mobile">mobile</option>
            </select>
        </div>

        <div class="col-12">
            <button type="submit" class="btn btn-primary">Agregar producto</button>
            <a href="/products" class="btn btn-secondary">Cancelar</a>
        </div>
        </form>
    </div>

</body>
</html>
